name: chat_app
description: "A multi-platform real-time chat application with Firebase."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: any
  firebase_auth: any
  cloud_firestore: any
  firebase_messaging: any
  google_sign_in: any
  flutter_riverpod: any
  go_router: any
  intl: any
  timeago: any
  http: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: any
  firebase_auth_mocks: any
  google_sign_in_mocks: any
  mockito: any
  build_runner: any

flutter:
  uses-material-design: true
